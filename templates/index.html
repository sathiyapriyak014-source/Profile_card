<!DOCTYPE html>
<html>

<head>
    <title>User Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Create Your Profile</h1>

    <form action="/profile" method="POST">

        <label>Name</label>
        <input type="text"
               name="name"
               placeholder="Enter your name"
               required>

        <label>Bio</label>

        <textarea
            name="bio"
            placeholder="Write a short bio"
            rows="5"
            required></textarea>

        <label>Image URL</label>

        <input type="text"
               name="image"
               placeholder="Paste image URL"
               required>

        <button type="submit">
            Create Profile
        </button>

    </form>

</div>

</body>
</html>
