<!DOCTYPE html>
<html>

<head>

    <title>Profile Card</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="card">

    <img src="{{ image }}" alt="Profile Image">

    <h2>{{ name }}</h2>

    <p>{{ bio }}</p>

    <a href="/">Create Another Profile</a>

</div>

</body>
</html>
